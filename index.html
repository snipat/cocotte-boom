<!DOCTYPE html>
<html lang="fr">
  <head>
      <meta charset="UTF-8">
      <title>Cocotte Boom</title>
      <link rel="icon" type="image/x-icon" href="favicon.ico">
      <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
      <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
      <link rel="apple-touch-icon" href="apple-touch-icon.png">
      <link rel="manifest" href="site.webmanifest">
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="default">
      <meta name="apple-mobile-web-app-title" content="Cocotte Boom">
      <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
      <link rel="stylesheet" href="cocotte.css?v=82">
      <script src="script.js?v=82"></script>
      <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js');
        }
        document.addEventListener('touchmove', function(e) {
          if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', function(e) {
          e.preventDefault();
        }, { passive: false });
      </script>
</head>
  <body>
    <div id="splash">
      <div id="splash-version"></div>
      <div id="splash-cocotte-wrap">
        <img id="splash-cocotte" class="base" src="cocotte.png"/>
      </div>
      <div id="splash-actions">
        <button id="splash-btn" onclick="lancerLeJeu()">Lancer le jeu</button>
        <div id="difficulty-selector">
          <button class="diff-btn" onclick="selectDiff(this)">Facile</button>
          <button class="diff-btn diff-active" onclick="selectDiff(this)">Moyen</button>
          <button class="diff-btn" onclick="selectDiff(this)">Difficile</button>
        </div>
      </div>
    </div>

    <div id="game">
      <div class="gameZone" id="gameZone">
        <div id="info-box">
          <button id="info-close" onclick="document.getElementById('info-box').style.display='none'">&#x2715;</button>
          <div id="version"></div>
          <div id="roulis">Roulis : —</div>
          <div id="tangage">Tangage : —</div>
          <div id="jauge">Pression : —</div>
        </div>
        <button id="mute-btn" onclick="toggleMute()">🔊</button>
        <div class="feu">
          <div id="cocotte-wrap">
            <img id="cocotte" class="base" src="cocotte.png"/>
            <img id="explosion" src="explosion.gif" style="display:none;"/>
            <div id="thumbs-up">👍</div>
          </div>
<div id="jaune" class="jaune"></div>
          <div id="orange" class="orange"></div>
          <div id="rouge" class="rouge"></div>
        </div>
      </div>
    </div>

    <div id="gameover-overlay" style="display:none;" onclick="if(event.target===this)closeGameOver();">
      <div id="gameover-popup">
        <button id="gameover-close" onclick="closeGameOver()">&#x2715;</button>
        <p id="gameover-text">Boum, retentez votre chance&nbsp;!</p>
        <button id="gameover-retry" onclick="retryGame()">J'essaie encore</button>
      </div>
    </div>
  </body>
</html>
