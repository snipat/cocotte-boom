<!DOCTYPE html>
<html lang="fr">
  <head>
      <meta charset="UTF-8">
      <title>Cocotte Boom</title>
      <link rel="icon" type="image/x-icon" href="favicon.ico">
      <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
      <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
      <link rel="apple-touch-icon" href="apple-touch-icon.png">
      <link rel="manifest" href="site.webmanifest">
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="default">
      <meta name="apple-mobile-web-app-title" content="Cocotte Boom">
      <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
      <link rel="stylesheet" href="cocotte.css?v=62">
      <script src="script.js?v=62"></script>
      <script>
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.register('/sw.js');
        }
        document.addEventListener('touchmove', function(e) {
          if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', function(e) {
          e.preventDefault();
        }, { passive: false });
      </script>
</head>
  <body>
    <div id="splash">
      <div id="splash-version"></div>
      <div id="splash-cocotte-wrap">
        <img id="splash-cocotte" class="base" src="cocotte.png"/>
      </div>
      <button id="splash-btn" onclick="lancerLeJeu()">Lancer le jeu</button>
    </div>

    <div id="game">
      <div class="gameZone" id="gameZone">
        <div>
          <div id="version" style="display: inline-block;"></div>
          <br>
          <div id="roulis"style="display: inline-block;">Roulis : capteur de mouvement non autorisé   </div>
          <div id="tangage"style="display: inline-block;">Tangage : capteur de mouvement non autorisé   </div>
          <div id="jauge" style="display: inline-block;">Pression :   </div>
        </div>
        <div>
          <audio id="ambiance" autoplay loop preload="auto" src="ambiance.wav"></audio>
          <audio id="ambiancemid" autoplay loop preload="auto" src="beep.wav"></audio>
          <audio id="ambiancehard" autoplay loop preload="auto" src="beep2.wav"></audio>
          <audio id="whistle" preload="auto" src="whistle.wav"></audio>
          <audio id="boom" autoplay preload="auto" src="explosion.wav"></audio>
          <audio id="bip1" loop preload="auto" src="bip1.wav"></audio>
          <audio id="bip2" loop preload="auto" src="bip2.wav"></audio>
          <audio id="bip3" loop preload="auto" src="bip3.wav"></audio>
        </div>
        <button id="mute-btn" onclick="toggleMute()">🔊</button>
        <div class="feu">
          <div id="cocotte-wrap">
            <img id="cocotte" class="base" src="cocotte.png"/>
            <img id="explosion" src="explosion.gif" style="display:none;"/>
          </div>
          <div id="jaune" class="jaune"></div>
          <div id="orange" class="orange"></div>
          <div id="red" class="red"></div>
        </div>
      </div>
    </div>

    <div id="gameover-overlay" style="display:none;" onclick="if(event.target===this)closeGameOver();">
      <div id="gameover-popup">
        <button id="gameover-close" onclick="closeGameOver()">&#x2715;</button>
        <p id="gameover-text">Boum, retentez votre chance&nbsp;!</p>
        <button id="gameover-retry" onclick="retryGame()">J'essaie encore</button>
      </div>
    </div>
  </body>
</html>
